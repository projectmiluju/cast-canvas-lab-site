name: Bug Report
description: Report a reproducible bug
title: '[BUG] '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: branch_name
    attributes:
      label: Planned Branch Name
      description: Must follow `<type>/<issue-number>-<slug>`.
      placeholder: fix/123-header-overlap
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
